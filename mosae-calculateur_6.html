// ---------- Calculation engine ----------
// Resolves: total = cirePure*(1+sum of wax-based additive %) + parfum + myristate(=%*parfum)
function calcRecette({poids, parfumOn, parfumPct, myristatePct, stearinePct, cs6000Pct, ww16On, ww16Pct, colorantOn, colorantPct}){
  let parfumG = 0, myristateG = 0;
  if(parfumOn){
    parfumG = poids * (parfumPct/100);
    myristateG = parfumG * (myristatePct/100);
  }
  const reste = poids - parfumG - myristateG;
  let factor = 1 + (stearinePct/100) + (cs6000Pct/100);
  if(ww16On) factor += ww16Pct/100;
  if(colorantOn) factor += colorantPct/100;
  const cirePure = reste / factor;
  const stearineG = cirePure * (stearinePct/100);
  const cs6000G = cirePure * (cs6000Pct/100);
  const ww16G = ww16On ? cirePure * (ww16Pct/100) : 0;
  const colorantG = colorantOn ? cirePure * (colorantPct/100) : 0;
  return {cirePure, stearineG, cs6000G, ww16G, colorantG, parfumG, myristateG};
}

function genCode(db, type, mecheRef){
  const n = db.compteur + 1;
  const xxx = String(n).padStart(3,"0");
  const meche = (mecheRef||"").replace(/\s+/g,"");
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `MC#${xxx}${type}-${meche}-${yy}${mm}${dd}`;
}

      ))}

  );
}

function PieChart({data}){
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:"doughnut",
      data:{labels:data.map(d=>d.label), datasets:[{data:data.map(d=>d.value), backgroundColor:data.map(d=>d.color), borderColor:"#F4EFE5", borderWidth:2}]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}}
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify(data)]);
  return <div style={{position:"relative",width:"100%",height:200}}><canvas ref={ref}></canvas></div>;
}

function StepBar({step, total=6}){
  return (
    <div style={{display:"flex",gap:4,marginBottom:"1.25rem"}}>
      {Array.from({length:total}).map((_,i)=>(

  const [parfumOn,setParfumOn] = useState(null);
  const [couleur,setCouleur] = useState(null);
  const [parfumId,setParfumId] = useState(db.parfums[0]?.id||null);
  const [parfumPct,setParfumPct] = useState(8);
  const [myristatePct,setMyristatePct] = useState(7.5);
  const [stearinePct,setStearinePct] = useState(10);
  const [cs6000Pct,setCs6000Pct] = useState(0.3);
  const [ww16On,setWw16On] = useState(false);
  const [ww16Pct] = useState(0.02);

  const [colorantPct,setColorantPct] = useState(0.3);

  const cire = db.cires.find(c=>c.id===cireId);

  function goCalc(){
    const r = calcRecette({poids, parfumOn, parfumPct, myristatePct, stearinePct, cs6000Pct, ww16On, ww16Pct, colorantOn: couleur==="couleur", colorantPct});
    const colorant = db.colorants.find(c=>c.id===colorantId);
    const parfum = db.parfums.find(p=>p.id===parfumId);
    setResult({
      type, cire, poids, parfumOn, colorMode: couleur,
      composition: r,
      parfum: parfumOn ? parfum : null,
      colorant: couleur==="couleur" ? colorant : null,
      ww16On,
      stearinePct, cs6000Pct, ww16Pct, colorantPct, parfumPct, myristatePct,

      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:"2rem"}}>

          <i className="ti ti-cube" style={{fontSize:22,color:"var(--blue)",marginRight:10}}></i>Moulée

  if(step===4) return (
    <div className="screen">
      <StepBar step={4}/>
      <p style={{fontSize:12,color:"var(--grey)",margin:"0 0 4px"}}>Étape 4 sur 6</p>
      <h2 style={{fontSize:20,marginBottom:"1.5rem"}}>Parfum ou sans parfum ?</h2>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:"2rem"}}>

        <button className="btn-secondary" style={{textAlign:"left",padding:"1.1rem",borderRadius:12,borderColor:couleur==="couleur"?"var(--blue)":undefined,borderWidth:couleur==="couleur"?2:undefined}} onClick={()=>setCouleur("couleur")}>

        </button>

      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.5rem"}}>
        <div className="card">
          <div className="row"><span style={{fontWeight:500,fontSize:14}}>Stéarine</span>
            <span><input type="number" value={stearinePct} onChange={e=>setStearinePct(Number(e.target.value))} style={{width:70,display:"inline-block"}}/> %</span></div>

          <div className="row"><span style={{fontWeight:500,fontSize:14}}>CS6000 <span style={{fontWeight:400,color:"var(--grey)"}}>— stabilisateur</span></span>
            <span><input type="number" step="0.1" value={cs6000Pct} onChange={e=>setCs6000Pct(Number(e.target.value))} style={{width:70,display:"inline-block"}}/> %</span></div>

function FicheResultat({result, db, nav}){
  if(!result) return <div className="screen"><button className="backbtn" onClick={()=>nav("home")}>← Accueil</button></div>;
  const {cire, poids, composition:c, parfum, colorant, ww16On, stearinePct, cs6000Pct, ww16Pct, colorantPct, parfumPct, myristatePct} = result;

  const total = c.cirePure + c.stearineG + c.cs6000G + c.ww16G + c.colorantG + c.parfumG + c.myristateG;
  const coutCire = cire ? (c.cirePure/1000)*(cire.prix/(cire.qte/1000)) : 0;
  const coutStearine = db.additifs.find(a=>a.nom==="Stéarine") ? (c.stearineG/db.additifs.find(a=>a.nom==="Stéarine").qte)*db.additifs.find(a=>a.nom==="Stéarine").prix : 0;
  const cs6000Item = db.additifs.find(a=>a.nom==="CS6000");
  const coutCs6000 = cs6000Item ? (c.cs6000G/cs6000Item.qte)*cs6000Item.prix : 0;
  const ww16Item = db.additifs.find(a=>a.nom==="WW16");
  const coutWw16 = (ww16On && ww16Item) ? (c.ww16G/ww16Item.qte)*ww16Item.prix : 0;
  const coutColorant = colorant ? (c.colorantG/colorant.qte)*colorant.prix : 0;
  const coutParfum = parfum ? (c.parfumG/parfum.qte)*parfum.prix : 0;
  const myrItem = db.additifs.find(a=>a.nom==="Myristate d'isopropyle");
  const coutMyristate = (parfum && myrItem) ? (c.myristateG/myrItem.qte)*myrItem.prix : 0;
  const coutTotal = coutCire+coutStearine+coutCs6000+coutWw16+coutColorant+coutParfum+coutMyristate;
  const prixPublic = coutTotal*5;
  const prixB2B = prixPublic/2;

  const pieData = [
    {label:"Cire", value:(c.cirePure/total)*100, color:"#1E2FB8"},
    {label:"Stéarine", value:(c.stearineG/total)*100, color:"#D7263D"},
  ];
  if(parfum) pieData.push({label:"Parfum", value:(c.parfumG/total)*100, color:"#F5C518"});
  if(parfum) pieData.push({label:"Myristate", value:(c.myristateG/total)*100, color:"#D9D2C3"});
  pieData.push({label:"CS6000", value:(c.cs6000G/total)*100, color:"#1A1613"});
  if(colorant) pieData.push({label:"Colorant", value:(c.colorantG/total)*100, color:"#8a8272"});

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("home")}>← Accueil</button>
      <h2 style={{fontSize:20,marginBottom:4}}>{cire.nom} — {result.type==="M"?"moulée":"coulée"}</h2>
      <p style={{fontSize:13,color:"var(--grey)",margin:"0 0 1rem"}}>{poids} g total</p>

      <PieChart data={pieData}/>

      <p style={{fontSize:12,color:"var(--grey)",margin:"1rem 0 8px"}}>Coûts et prix conseillés (×5)</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:"1.25rem"}}>
        <div className="card" style={{textAlign:"center"}}><p style={{fontSize:11,color:"var(--grey)",margin:"0 0 4px"}}>Coût</p><p className="mono" style={{fontSize:15,fontWeight:500,margin:0}}>{coutTotal.toFixed(2)}€</p></div>
        <div style={{background:"var(--pierre)",borderRadius:10,padding:"0.75rem",textAlign:"center"}}><p style={{fontSize:11,color:"var(--greydark)",margin:"0 0 4px"}}>B2B</p><p className="mono" style={{fontSize:15,fontWeight:500,margin:0}}>{prixB2B.toFixed(2)}€</p></div>
        <div style={{background:"var(--blue)",borderRadius:10,padding:"0.75rem",textAlign:"center"}}><p style={{fontSize:11,color:"#c9cff2",margin:"0 0 4px"}}>Public</p><p className="mono" style={{fontSize:15,fontWeight:500,margin:0,color:"var(--ecru)"}}>{prixPublic.toFixed(2)}€</p></div>
      </div>

      <p style={{fontSize:12,color:"var(--grey)",margin:"0 0 8px"}}>Composition et coût</p>
      <table style={{width:"100%",fontSize:14,borderCollapse:"collapse",marginBottom:"1.25rem"}}>
        <tbody>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>{cire.nom}</td><td className="mono" style={{textAlign:"right"}}>{c.cirePure.toFixed(1)} g</td><td className="mono" style={{textAlign:"right"}}>{coutCire.toFixed(2)}€</td></tr>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>Stéarine</td><td className="mono" style={{textAlign:"right"}}>{c.stearineG.toFixed(1)} g</td><td className="mono" style={{textAlign:"right"}}>{coutStearine.toFixed(2)}€</td></tr>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>CS6000</td><td className="mono" style={{textAlign:"right"}}>{c.cs6000G.toFixed(1)} g</td><td className="mono" style={{textAlign:"right"}}>{coutCs6000.toFixed(2)}€</td></tr>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>WW16</td><td className="mono" style={{textAlign:"right",color:"var(--grey)"}}>{ww16On?c.ww16G.toFixed(2)+" g":"None"}</td><td className="mono" style={{textAlign:"right",color:"var(--grey)"}}>{ww16On?coutWw16.toFixed(2)+"€":"None"}</td></tr>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>{colorant ? "Colorant ("+colorant.nom+")" : "Colorant"}</td><td className="mono" style={{textAlign:"right",color:colorant?undefined:"var(--grey)"}}>{colorant?c.colorantG.toFixed(1)+" g":"None"}</td><td className="mono" style={{textAlign:"right",color:colorant?undefined:"var(--grey)"}}>{colorant?coutColorant.toFixed(2)+"€":"None"}</td></tr>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>{parfum ? "Parfum ("+parfum.nom+")" : "Parfum"}</td><td className="mono" style={{textAlign:"right",color:parfum?undefined:"var(--grey)"}}>{parfum?c.parfumG.toFixed(1)+" g":"None"}</td><td className="mono" style={{textAlign:"right",color:parfum?undefined:"var(--grey)"}}>{parfum?coutParfum.toFixed(2)+"€":"None"}</td></tr>
          <tr><td style={{padding:"8px 0"}}>Myristate</td><td className="mono" style={{textAlign:"right",color:parfum?undefined:"var(--grey)"}}>{parfum?c.myristateG.toFixed(1)+" g":"None"}</td><td className="mono" style={{textAlign:"right",color:parfum?undefined:"var(--grey)"}}>{parfum?coutMyristate.toFixed(2)+"€":"None"}</td></tr>
        </tbody>
      </table>

      <p style={{fontSize:12,color:"var(--grey)",margin:"0 0 8px"}}>Séquence de température</p>

function Checklist({result, db, setDb, nav, setLastCode}){
  const [mecheRef,setMecheRef] = useState("");
  const [checks,setChecks] = useState({});
  if(!result) return null;
  const {cire, composition:c, parfum, colorant, ww16On} = result;
  const items = [
    {key:"base", label:cire.nom+" + Stéarine + CS6000", temp:"fonte initiale", g:(c.cirePure+c.stearineG+c.cs6000G).toFixed(1)+" g"},
  ];
  if(ww16On) items.push({key:"ww16", label:"WW16", temp:"cire fondue", g:c.ww16G.toFixed(2)+" g"});
  if(colorant) items.push({key:"colorant", label:"Colorant — "+colorant.nom, temp:"≥ 70°C", g:c.colorantG.toFixed(1)+" g"});
  if(parfum) items.push({key:"parfum", label:"Parfum + Myristate", temp:"75–80°C", g:(c.parfumG+c.myristateG).toFixed(1)+" g"});

  const allChecked = items.every(i=>checks[i.key]);

  function encoder(){
    const code = genCode(db, result.type, mecheRef);
    const now = new Date();
    const entry = {
      code, date: now.toISOString(), modele: cire.nom, type: result.type, poids: result.poids,
      composition: c, parfum: parfum?{nom:parfum.nom}:null, colorant: colorant?{nom:colorant.nom, hex:colorant.hex}:null,
      ww16On, mecheRef, rating:{combustion:0,diffusion:0,aspect:0}, note:"",
    };
    const newDb = {...db, historique:[entry, ...db.historique], compteur: db.compteur+1};
    setDb(newDb); saveDB(newDb);
    setLastCode(code);
    nav("confirmation");
  }

  return (
    <div className="screen">
      <h2 style={{fontSize:20,marginBottom:8}}>Conception</h2>
      <label className="label">Référence de mèche utilisée</label>
      <input value={mecheRef} onChange={e=>setMecheRef(e.target.value)} placeholder="ex. TCR 24/12" style={{marginBottom:"1.25rem"}}/>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"1.25rem"}}>
        {items.map(it=>(
          <label key={it.key} className="card" style={{display:"flex",alignItems:"center",gap:12}}>
            <input type="checkbox" checked={!!checks[it.key]} onChange={e=>setChecks({...checks,[it.key]:e.target.checked})}/>
            <div style={{flex:1}}>
              <p style={{fontSize:14,fontWeight:500,margin:0}}>{it.label}</p>
              <p style={{fontSize:12,color:"var(--grey)",margin:"2px 0 0"}}>{it.temp}</p>
            </div>
            <span className="mono" style={{fontSize:14}}>{it.g}</span>
          </label>
        ))}
      </div>
      <button className="btn-primary" style={{width:"100%",padding:14,fontSize:15,opacity:allChecked?1:0.4,background:allChecked?"var(--blue)":"var(--pierre)",color:allChecked?"var(--ecru)":"var(--grey)"}} disabled={!allChecked} onClick={encoder}>Encoder dans l'historique</button>
    </div>
  );
}

function Historique({db, nav, setDetailCode}){
  const [q,setQ] = useState("");
  const filtered = db.historique.filter(h=>h.code.toLowerCase().includes(q.toLowerCase())||h.modele.toLowerCase().includes(q.toLowerCase()));

  function exportCSV(){
    const headers = ["code","date","modele","type","poids","parfum","colorant","note"];
    const rows = db.historique.map(h=>[h.code, h.date, h.modele, h.type, h.poids, h.parfum?.nom||"", h.colorant?.nom||"", h.note||""]);
    const csv = [headers.join(","), ...rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","))].join("\n");
    const d = new Date();
    const yy=String(d.getFullYear()).slice(2), mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
    const blob = new Blob([csv], {type:"text/csv"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `MC${yy}${mm}${dd}-backup-creations.csv`;
    link.click();
  }

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("home")}>← Accueil</button>
      <div className="row" style={{marginBottom:"1rem"}}>
        <h2 style={{fontSize:20}}>Historique</h2>
        <button className="btn-secondary" style={{padding:"8px 12px",fontSize:13}} onClick={exportCSV}>⬇ Exporter tout</button>
      </div>
      <input placeholder="Rechercher par code, modèle..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:"1rem"}}/>
      {filtered.length===0 && <p style={{color:"var(--grey)",fontSize:14}}>Aucune création pour l'instant.</p>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(h=>{
          const avg = (h.rating.combustion+h.rating.diffusion+h.rating.aspect);
          const cnt = [h.rating.combustion,h.rating.diffusion,h.rating.aspect].filter(v=>v>0).length;
          const note = cnt? (avg/cnt).toFixed(1) : null;
          return (
            <button key={h.code} className="card" style={{textAlign:"left",cursor:"pointer"}} onClick={()=>{setDetailCode(h.code); nav("historique-detail");}}>
              <div className="mono" style={{fontSize:13}}>{h.code}</div>
              <div style={{fontSize:12,color:"var(--grey)",marginTop:2}}>{h.modele} — {h.type==="M"?"moulée":"coulée"} — {h.poids} g {note && <span className="mono" style={{color:"#8a6d0c",fontWeight:500}}>· {note}/5</span>}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function InventaireForm({db, setDb, cat, editId, nav}){
  const existing = editId ? db[cat].find(i=>i.id===editId) : null;
  const [form,setForm] = useState(existing || {});
  const [confirmDelete,setConfirmDelete] = useState(false);
  const [deleteText,setDeleteText] = useState("");
  const fields = fieldsFor(cat);

  function save(){
    let newItems;
    if(editId){
      newItems = db[cat].map(i=> i.id===editId ? {...form, id:editId} : i);
    } else {
      const newId = Math.max(0,...db[cat].map(i=>i.id)) + 1;
      newItems = [...db[cat], {...form, id:newId}];
    }
    const newDb = {...db, [cat]: newItems};
    setDb(newDb); saveDB(newDb);
    nav("inventaire-liste");
  }
  function del(){
    const newDb = {...db, [cat]: db[cat].filter(i=>i.id!==editId)};
    setDb(newDb); saveDB(newDb);
    nav("inventaire-liste");
  }

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("inventaire-liste")}>← {CATEGORIES.find(c=>c.key===cat).label}</button>
      <h2 style={{fontSize:20,marginBottom:"1.25rem"}}>{existing ? existing.nom : "Nouvelle entrée"}</h2>
      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:"1.5rem"}}>
        {fields.filter(f=>!f.showIf || f.showIf(form)).map(f=>(
          <div key={f.k}>
            <label className="label">{f.l}</label>
            {f.t==="select" ? (
              <select value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}>
                <option value="">—</option>
                {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ) : f.t==="color" ? (
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <label style={{position:"relative",cursor:"pointer"}}>
                  <span style={{display:"block",width:44,height:44,borderRadius:"50%",background:form[f.k]||"#D7263D",border:"0.5px solid var(--pierre)"}}></span>
                  <input type="color" value={form[f.k]||"#D7263D"} onChange={e=>setForm({...form,[f.k]:e.target.value})} style={{position:"absolute",opacity:0,width:44,height:44,top:0,left:0,cursor:"pointer"}}/>
                </label>
                <input value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})} style={{flex:1}}/>
              </div>
            ) : (
              <input type={f.t} value={form[f.k]??""} onChange={e=>setForm({...form,[f.k]: f.t==="number"?Number(e.target.value):e.target.value})}/>
            )}
          </div>
        ))}
      </div>
      <button className="btn-primary" style={{width:"100%",marginBottom:8}} onClick={save}>Enregistrer</button>
      {existing && !confirmDelete && (
        <button className="btn-danger" style={{width:"100%"}} onClick={()=>setConfirmDelete(true)}>🗑 Supprimer cette entrée</button>
      )}
      {existing && confirmDelete && (
        <div className="card" style={{borderColor:"var(--red)"}}>
          <p style={{fontSize:13,marginBottom:8}}>Tape DELETE pour confirmer la suppression.</p>
          <input value={deleteText} onChange={e=>setDeleteText(e.target.value)} placeholder="DELETE" style={{marginBottom:8}}/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-secondary" style={{flex:1}} onClick={()=>setConfirmDelete(false)}>Annuler</button>
            <button className="btn-danger" style={{flex:1}} disabled={deleteText!=="DELETE"} onClick={del}>Supprimer</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- App ----------
function App(){
  const [db,setDb] = useState(null);
  const [syncError,setSyncError] = useState(null);
  const [screen,setScreen] = useState("home");
  const [result,setResult] = useState(null);
  const [lastCode,setLastCode] = useState("");
  const [detailCode,setDetailCode] = useState(null);
  const [cat,setCat] = useState("cires");
  const [editId,setEditId] = useState(null);

  useEffect(()=>{
    const unsub = DB_DOC.onSnapshot(
      (snap)=>{
        if(snap.exists){
          setDb(snap.data());
        } else {
          const seeded = seedDB();
          DB_DOC.set(seeded).then(()=>setDb(seeded)).catch(e=>setSyncError(String(e)));
        }
      },
      (err)=>{ setSyncError(String(err)); }
    );
    return ()=>unsub();
  },[]);

  function nav(s){ setScreen(s); window.scrollTo(0,0); }

  if(syncError){
    return <div className="screen"><h2 style={{fontSize:18,color:"var(--red)"}}>Connexion à la base impossible</h2><p style={{fontSize:13,color:"var(--grey)"}}>{syncError}</p></div>;
  }
  if(!db){
    return <div className="screen" style={{textAlign:"center",paddingTop:"4rem"}}><p style={{color:"var(--grey)"}}>Connexion à la base de données…</p></div>;
  }

  let content;
  if(screen==="home") content = <Home nav={nav}/>;
  else if(screen==="libre-type") content = <LibreFlow db={db} nav={nav} setResult={setResult}/>;
  else if(screen==="fiche") content = <FicheResultat result={result} db={db} nav={nav}/>;
  else if(screen==="checklist") content = <Checklist result={result} db={db} setDb={setDb} nav={nav} setLastCode={setLastCode}/>;
  else if(screen==="confirmation") content = <Confirmation code={lastCode} nav={nav}/>;
  else if(screen==="historique") content = <Historique db={db} nav={nav} setDetailCode={setDetailCode}/>;
  else if(screen==="historique-detail") content = <HistoriqueDetail db={db} setDb={setDb} code={detailCode} nav={nav}/>;
  else if(screen==="formules") content = <Formules db={db} nav={nav} setResult={setResult}/>;
  else if(screen==="inventaire") content = <InventaireHome db={db} nav={nav} setCat={setCat}/>;
  else if(screen==="inventaire-liste") content = <InventaireListe db={db} setDb={setDb} cat={cat} nav={nav} setEditId={setEditId}/>;
  else if(screen==="inventaire-form") content = <InventaireForm db={db} setDb={setDb} cat={cat} editId={editId} nav={nav}/>;
  else content = <Home nav={nav}/>;

  return content;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
