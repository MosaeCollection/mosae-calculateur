// ---------- Calculation engine ----------
// Resolves: total = cirePure*(1+sum of wax-based additive %) + parfum + myristate(=%*parfum)
function calcRecette({poids, parfumOn, parfumPct, myristatePct, stearinePct, cs6000Pct, ww16On, ww16Pct, colorantOn, colorantPct}){
  let parfumG = 0, myristateG = 0;
  if(parfumOn){
    parfumG = poids * (parfumPct/100);
    myristateG = parfumG * (myristatePct/100);
  }
  const reste = poids - parfumG - myristateG;
  let factor = 1 + (stearinePct/100) + (cs6000Pct/100);
  if(ww16On) factor += ww16Pct/100;
  if(colorantOn) factor += colorantPct/100;
  const cirePure = reste / factor;
  const stearineG = cirePure * (stearinePct/100);
  const cs6000G = cirePure * (cs6000Pct/100);
  const ww16G = ww16On ? cirePure * (ww16Pct/100) : 0;
  const colorantG = colorantOn ? cirePure * (colorantPct/100) : 0;
  return {cirePure, stearineG, cs6000G, ww16G, colorantG, parfumG, myristateG};
}

function genCode(db, type, mecheRef){
  const n = db.compteur + 1;
  const xxx = String(n).padStart(3,"0");
  const meche = (mecheRef||"").replace(/\s+/g,"");
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `MC#${xxx}${type}-${meche}-${yy}${mm}${dd}`;
}

function StockBar({stock, qte, unit}){
  if(typeof stock!=="number" || !qte) return null;
  const pct = Math.max(0, Math.min(100, (stock/qte)*100));
  const color = pct>=50 ? "var(--stock-ok)" : pct>=20 ? "var(--stock-mid)" : "var(--red)";
  return (
    <div>
      <div className="row" style={{marginBottom:4}}>
        <span></span>
        <span className="mono" style={{fontSize:11,color:"var(--grey)"}}>{stock}{unit} / {qte}{unit}</span>
      </div>
      <div style={{width:"100%",height:5,background:"var(--pierre)",borderRadius:3,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:color}}></div>
      </div>
    </div>
  );
}

function PieChart({data}){
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:"doughnut",
      data:{labels:data.map(d=>d.label), datasets:[{data:data.map(d=>d.value), backgroundColor:data.map(d=>d.color), borderColor:"#F4EFE5", borderWidth:2}]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}}
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify(data)]);
  return <div style={{position:"relative",width:"100%",height:200}}><canvas ref={ref}></canvas></div>;
}

    const yy=String(d.getFullYear()).slice(2), mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);

    const file = e.target.files[0];

            <select value={myristateId||""} onChange={e=>setMyristateId(Number(e.target.value))}>
              {db.additifs.map(a=><option key={a.id} value={a.id}>{a.nom} — {a.fournisseur}</option>)}
            </select>

        )}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn-secondary" style={{flex:1}} onClick={()=>setStep(5)}>← Retour</button>
        <button className="btn-primary" style={{flex:1}} onClick={goCalc}>Calculer</button>
      </div>
    </div>
  );
}

function Checklist({result, db, setDb, nav, setLastCode}){
  const [mecheId,setMecheId] = useState(result?.mecheId || (db.meches[0]?.id||null));
  const [nbMeches,setNbMeches] = useState(result?.nbMeches || 1);
  const [checks,setChecks] = useState({});
  if(!result) return null;
  const {cire, composition:c, parfum, colorant, ww16On, contenant, stearineItem, cs6000Item, ww16Item, myristateItem} = result;
  const meche = db.meches.find(m=>m.id===mecheId);
  const temp = (cire.coulage!=null && cire.coulage!=="") ? `${cire.coulage}°C (utilisation)` : "température d'utilisation non renseignée";
  const items = [
    {key:"base", label:cire.nom+" + Stéarine + CS6000", temp, g:(c.cirePure+c.stearineG+c.cs6000G).toFixed(1)+" g"},
  ];
  if(ww16On) items.push({key:"ww16", label:"WW16", temp:"cire fondue", g:c.ww16G.toFixed(2)+" g"});
  if(colorant) items.push({key:"colorant", label:"Colorant — "+colorant.nom, temp:"≥ 70°C", g:c.colorantG.toFixed(1)+" g"});
  if(parfum) items.push({key:"parfum", label:"Parfum + Myristate", temp:"75–80°C", g:(c.parfumG+c.myristateG).toFixed(1)+" g"});

  const allChecked = items.every(i=>checks[i.key]);

  // Calcul des besoins vs stock disponible (référencé par identifiant, fixé au moment du calcul de la recette)
  const needs = [
    {item:cire, cat:"cires", need:c.cirePure},
  ];
  if(stearineItem) needs.push({item:stearineItem, cat:"additifs", need:c.stearineG});
  if(cs6000Item) needs.push({item:cs6000Item, cat:"additifs", need:c.cs6000G});
  if(ww16On && ww16Item) needs.push({item:ww16Item, cat:"additifs", need:c.ww16G});
  if(colorant) needs.push({item:colorant, cat:"colorants", need:c.colorantG});
  if(parfum) needs.push({item:parfum, cat:"parfums", need:c.parfumG});
  if(parfum && myristateItem) needs.push({item:myristateItem, cat:"additifs", need:c.myristateG});
  if(contenant) needs.push({item:contenant, cat:"contenants", need:1});
  if(meche) needs.push({item:meche, cat:"meches", need:nbMeches});

  const shortfalls = needs.filter(n=> typeof n.item.stock==="number" && n.item.stock - n.need < 0);

  function encoder(){
    const mecheRef = meche ? meche.nom : "";
    const code = genCode(db, result.type, mecheRef);
    const now = new Date();
    const entry = {
      code, date: now.toISOString(), modele: cire.nom, type: result.type, poids: result.poids,
      composition: c, parfum: parfum?{nom:parfum.nom}:null, colorant: colorant?{nom:colorant.nom, hex:colorant.hex}:null,
      contenant: contenant?{nom:contenant.nom}:null,
      ww16On, mecheRef, mecheId, nbMeches, rating:{combustion:0,diffusion:0,aspect:0}, note:"",
    };

    // Décompte du stock pour chaque composant utilisé
    let newDb = {...db};
    needs.forEach(n=>{
      if(typeof n.item.stock!=="number") return;
      const newStock = n.item.stock - n.need;
      newDb = {...newDb, [n.cat]: newDb[n.cat].map(x=> x.id===n.item.id ? {...x, stock:newStock} : x)};
    });
    newDb = {...newDb, historique:[entry, ...newDb.historique], compteur: newDb.compteur+1};
    setDb(newDb); saveDB(newDb);
    setLastCode(code);
    nav("confirmation");
  }

  return (
    <div className="screen">
      <h2 style={{fontSize:20,marginBottom:8}}>Conception</h2>
      <div style={{display:"flex",gap:10,marginBottom:"1.25rem"}}>
        <div style={{flex:2}}>
          <label className="label">Mèche utilisée</label>
          <select value={mecheId||""} onChange={e=>setMecheId(Number(e.target.value))}>
            {db.meches.map(m=><option key={m.id} value={m.id}>{m.nom}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <label className="label">Nombre de mèches</label>
          <input type="number" min="1" value={nbMeches} onChange={e=>setNbMeches(Math.max(1,Number(e.target.value)))}/>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"1.25rem"}}>
        {items.map(it=>(
          <label key={it.key} className="card" style={{display:"flex",alignItems:"center",gap:12}}>
            <input type="checkbox" checked={!!checks[it.key]} onChange={e=>setChecks({...checks,[it.key]:e.target.checked})}/>
            <div style={{flex:1}}>
              <p style={{fontSize:14,fontWeight:500,margin:0}}>{it.label}</p>
              <p style={{fontSize:12,color:"var(--grey)",margin:"2px 0 0"}}>{it.temp}</p>
            </div>
            <span className="mono" style={{fontSize:14}}>{it.g}</span>
          </label>
        ))}
      </div>
      {shortfalls.length>0 && (
        <div className="card" style={{borderColor:"var(--red)",marginBottom:"1.25rem"}}>
          <p style={{fontSize:13,fontWeight:500,color:"var(--red)",margin:"0 0 6px"}}>⚠ Stock insuffisant</p>
          {shortfalls.map((s,i)=>(
            <p key={i} style={{fontSize:12,color:"var(--greydark)",margin:"2px 0"}}>
              {s.item.nom} — besoin {s.need.toFixed ? s.need.toFixed(1) : s.need}, stock {s.item.stock}
            </p>
          ))}
        </div>
      )}
      <button className="btn-primary" style={{width:"100%",padding:14,fontSize:15,opacity:allChecked?1:0.4,background:allChecked?"var(--blue)":"var(--pierre)",color:allChecked?"var(--ecru)":"var(--grey)"}} disabled={!allChecked} onClick={encoder}>Encoder dans l'historique</button>
    </div>
  );
}

    <div className="screen" style={{textAlign:"center"}}>
      <div style={{width:56,height:56,borderRadius:"50%",background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",margin:"2rem auto 1.25rem"}}>

function Historique({db, nav, setDetailCode}){
  const [q,setQ] = useState("");
  const filtered = db.historique.filter(h=>h.code.toLowerCase().includes(q.toLowerCase())||h.modele.toLowerCase().includes(q.toLowerCase()));

  function exportCSV(){
    const headers = ["code","date","modele","type","poids","parfum","colorant","note"];
    const rows = db.historique.map(h=>[h.code, h.date, h.modele, h.type, h.poids, h.parfum?.nom||"", h.colorant?.nom||"", h.note||""]);
    const csv = [headers.join(","), ...rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","))].join("\n");
    const d = new Date();
    const yy=String(d.getFullYear()).slice(2), mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
    const blob = new Blob([csv], {type:"text/csv"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `MC${yy}${mm}${dd}-backup-creations.csv`;
    link.click();
  }

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("home")}>← Accueil</button>
      <div className="row" style={{marginBottom:"1rem"}}>
        <h2 style={{fontSize:20}}>Historique</h2>
        <button className="btn-secondary" style={{padding:"8px 12px",fontSize:13}} onClick={exportCSV}>⬇ Exporter tout</button>
      </div>
      <input placeholder="Rechercher par code, modèle..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:"1rem"}}/>
      {filtered.length===0 && <p style={{color:"var(--grey)",fontSize:14}}>Aucune création pour l'instant.</p>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(h=>{
          const avg = (h.rating.combustion+h.rating.diffusion+h.rating.aspect);
          const cnt = [h.rating.combustion,h.rating.diffusion,h.rating.aspect].filter(v=>v>0).length;
          const note = cnt? (avg/cnt).toFixed(1) : null;
          return (
            <button key={h.code} className="card" style={{textAlign:"left",cursor:"pointer"}} onClick={()=>{setDetailCode(h.code); nav("historique-detail");}}>
              <div className="mono" style={{fontSize:13}}>{h.code}</div>
              <div style={{fontSize:12,color:"var(--grey)",marginTop:2}}>{h.modele} — {h.type==="M"?"moulée":"coulée"} — {h.poids} g {note && <span className="mono" style={{color:"#8a6d0c",fontWeight:500}}>· {note}/5</span>}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function HistoriqueDetail({db, setDb, code, nav}){
  const entry = db.historique.find(h=>h.code===code);
  const [rating,setRating] = useState(entry?entry.rating:{combustion:0,diffusion:0,aspect:0});
  const [note,setNote] = useState(entry?entry.note:"");
  const [confirmDelete,setConfirmDelete] = useState(false);
  const [deleteText,setDeleteText] = useState("");
  if(!entry) return <div className="screen"><button className="backbtn" onClick={()=>nav("historique")}>← Historique</button></div>;

  function save(){
    const newHist = db.historique.map(h=> h.code===code ? {...h, rating, note} : h);
    const newDb = {...db, historique:newHist};
    setDb(newDb); saveDB(newDb);
  }
  function del(){
    const newHist = db.historique.filter(h=>h.code!==code);
    const newDb = {...db, historique:newHist};
    setDb(newDb); saveDB(newDb);
    nav("historique");
  }

  const c = entry.composition;
  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("historique")}>← Historique</button>
      <div className="chip" style={{marginBottom:"1rem"}}>{entry.code}</div>
      <div style={{background:"var(--encre)",borderRadius:8,padding:"0.6rem 1rem",textAlign:"center",marginBottom:"1.25rem"}}>
        <span style={{fontSize:12,color:"var(--ecru)"}}>Création archivée — lecture seule</span>
      </div>
      <div className="row" style={{marginBottom:"1rem"}}>
        <h2 style={{fontSize:20}}>{entry.modele} — {entry.type==="M"?"moulée":"coulée"}</h2>
        <span style={{fontSize:13,color:"var(--grey)"}}>{entry.poids} g</span>
      </div>
      {entry.mecheRef && (
        <p style={{fontSize:13,color:"var(--grey)",margin:"0 0 1rem"}}>Mèche : {entry.mecheRef} × {entry.nbMeches||1}</p>
      )}
      <table style={{width:"100%",fontSize:14,marginBottom:"1.25rem"}}>
        <tbody>
          <tr style={{borderBottom:"0.5px solid var(--pierre)"}}><td style={{padding:"8px 0"}}>Cire</td><td className="mono" style={{textAlign:"right"}}>{c.cirePure.toFixed(1)} g</td></tr>
          <tr><td style={{padding:"8px 0"}}>Stéarine</td><td className="mono" style={{textAlign:"right"}}>{c.stearineG.toFixed(1)} g</td></tr>
        </tbody>
      </table>

      <p style={{fontSize:12,color:"var(--grey)",margin:"0 0 10px"}}>Évaluation</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
        <div className="row"><span style={{fontSize:14}}>Combustion</span><Stars value={rating.combustion} onChange={v=>setRating({...rating,combustion:v})}/></div>
        <div className="row"><span style={{fontSize:14}}>Diffusion du parfum</span><Stars value={rating.diffusion} onChange={v=>setRating({...rating,diffusion:v})}/></div>
        <div className="row"><span style={{fontSize:14}}>Aspect visuel</span><Stars value={rating.aspect} onChange={v=>setRating({...rating,aspect:v})}/></div>
      </div>
      <label className="label">Note</label>
      <textarea rows="4" value={note} onChange={e=>setNote(e.target.value)} placeholder="Observations libres..." style={{marginBottom:"1rem"}}></textarea>
      <button className="btn-primary" style={{width:"100%",marginBottom:8}} onClick={save}>Enregistrer l'évaluation</button>
      {!confirmDelete && (
        <button className="btn-danger" style={{width:"100%"}} onClick={()=>setConfirmDelete(true)}>🗑 Supprimer cette création</button>
      )}
      {confirmDelete && (
        <div className="card" style={{borderColor:"var(--red)"}}>
          <p style={{fontSize:13,marginBottom:8}}>Tape DELETE pour confirmer la suppression définitive.</p>
          <input value={deleteText} onChange={e=>setDeleteText(e.target.value)} placeholder="DELETE" style={{marginBottom:8}}/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-secondary" style={{flex:1}} onClick={()=>{setConfirmDelete(false);setDeleteText("");}}>Annuler</button>
            <button className="btn-danger" style={{flex:1}} disabled={deleteText!=="DELETE"} onClick={del}>Supprimer</button>
          </div>
        </div>
      )}
    </div>
  );
}

function FormuleManuelle({db, setDb, modeleId, version, nav, setResult}){
  const m = db.modeles.find(x=>x.id===modeleId);
  const [type,setType] = useState("C");
  const [cireId,setCireId] = useState(db.cires[0]?.id||null);
  const [stearinePct,setStearinePct] = useState(10);
  const [cs6000Pct,setCs6000Pct] = useState(0.3);
  const [ww16On,setWw16On] = useState(false);
  const [ww16Pct] = useState(0.02);
  const [colorantOn,setColorantOn] = useState(false);
  const [colorantId,setColorantId] = useState(db.colorants[0]?.id||null);
  const [colorantPct,setColorantPct] = useState(0.3);
  const [parfumId,setParfumId] = useState(db.parfums[0]?.id||null);
  const [parfumPct,setParfumPct] = useState(8);
  const [myristatePct,setMyristatePct] = useState(7.5);
  const [mecheId,setMecheId] = useState(db.meches[0]?.id||null);
  const [nbMeches,setNbMeches] = useState(1);
  const [contenantId,setContenantId] = useState((db.contenants&&db.contenants[0]?.id)||null);
  const [stearineId,setStearineId] = useState((db.additifs.find(a=>a.nom==="Stéarine")||db.additifs[0])?.id||null);
  const [cs6000Id,setCs6000Id] = useState((db.additifs.find(a=>a.nom==="CS6000")||db.additifs[0])?.id||null);
  const [ww16Id,setWw16Id] = useState((db.additifs.find(a=>a.nom==="WW16")||db.additifs[0])?.id||null);
  const [myristateId,setMyristateId] = useState((db.additifs.find(a=>a.nom==="Myristate d'isopropyle")||db.additifs[0])?.id||null);
  const parfumOn = version==="avec";

  function approuver(){
    const cire = db.cires.find(c=>c.id===cireId);
    const colorant = colorantOn ? db.colorants.find(c=>c.id===colorantId) : null;
    const parfum = parfumOn ? db.parfums.find(p=>p.id===parfumId) : null;
    const contenant = type==="C" ? (db.contenants||[]).find(c=>c.id===contenantId) : null;
    const r = calcRecette({poids:m.poids, parfumOn, parfumPct, myristatePct, stearinePct, cs6000Pct, ww16On, ww16Pct, colorantOn, colorantPct});
    const result = {
      type, cire, poids:m.poids, parfumOn, colorMode: colorantOn?"couleur":"blanc",
      composition:r, parfum, colorant, ww16On, contenant,
      stearinePct, cs6000Pct, ww16Pct, colorantPct, parfumPct, myristatePct,
      mecheId, nbMeches,
      stearineItem: db.additifs.find(a=>a.id===stearineId)||null,
      cs6000Item: db.additifs.find(a=>a.id===cs6000Id)||null,
      ww16Item: ww16On ? (db.additifs.find(a=>a.id===ww16Id)||null) : null,
      myristateItem: parfumOn ? (db.additifs.find(a=>a.id===myristateId)||null) : null,
    };
    const field = version==="avec" ? "formuleAvecParfum" : "formuleSansParfum";
    const newModeles = db.modeles.map(x=> x.id===modeleId ? {...x, [field]: result} : x);
    const newDb = {...db, modeles:newModeles};
    setDb(newDb); saveDB(newDb);
    setResult(result);
    nav("fiche");
  }

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("formules")}>← {m.nom}</button>
      <h2 style={{fontSize:20,marginBottom:4}}>Saisir la formule manuellement</h2>
      <p style={{fontSize:13,color:"var(--grey)",margin:"0 0 1.25rem"}}>Version : {version==="avec"?"Avec parfum":"Sans parfum"} — {m.poids} g</p>
      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:"1.5rem"}}>
        <div>
          <label className="label">Type</label>
          <select value={type} onChange={e=>setType(e.target.value)}>
            <option value="M">Moulée</option>
            <option value="C">Coulée</option>
          </select>
        </div>
        <div>
          <label className="label">Cire</label>
          <select value={cireId||""} onChange={e=>setCireId(Number(e.target.value))}>
            {db.cires.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
          </select>
        </div>
        {type==="C" && (
          <div>
            <label className="label">Contenant</label>
            <select value={contenantId||""} onChange={e=>setContenantId(Number(e.target.value))}>
              {(db.contenants||[]).map(c=><option key={c.id} value={c.id}>{c.nom} — {c.poids} g vide</option>)}
            </select>
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:2}}>
            <label className="label">Mèche</label>
            <select value={mecheId||""} onChange={e=>setMecheId(Number(e.target.value))}>
              {db.meches.map(m=><option key={m.id} value={m.id}>{m.nom}</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <label className="label">Nombre de mèches</label>
            <input type="number" min="1" value={nbMeches} onChange={e=>setNbMeches(Math.max(1,Number(e.target.value)))}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <label className="label">Stéarine (%)</label>
            <input type="number" value={stearinePct} onChange={e=>setStearinePct(Number(e.target.value))}/>
          </div>
          <div style={{flex:1}}>
            <label className="label">CS6000 (%)</label>
            <input type="number" step="0.1" value={cs6000Pct} onChange={e=>setCs6000Pct(Number(e.target.value))}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <label className="label">Article stéarine</label>
            <select value={stearineId||""} onChange={e=>setStearineId(Number(e.target.value))}>
              {db.additifs.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}
            </select>
          </div>
          <div style={{flex:1}}>
            <label className="label">Article CS6000</label>
            <select value={cs6000Id||""} onChange={e=>setCs6000Id(Number(e.target.value))}>
              {db.additifs.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}
            </select>
          </div>
        </div>
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14}}>
          <input type="checkbox" checked={ww16On} onChange={e=>setWw16On(e.target.checked)}/> WW16 (blanchisseur, 0.02%)
        </label>
        {ww16On && (
          <div>
            <label className="label">Article WW16</label>
            <select value={ww16Id||""} onChange={e=>setWw16Id(Number(e.target.value))}>
              {db.additifs.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}
            </select>
          </div>
        )}
        <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14}}>
          <input type="checkbox" checked={colorantOn} onChange={e=>setColorantOn(e.target.checked)}/> Colorant
        </label>
        {colorantOn && (
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:2}}>
              <label className="label">Colorant</label>
              <select value={colorantId||""} onChange={e=>setColorantId(Number(e.target.value))}>
                {db.colorants.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="label">Dosage (%)</label>
              <input type="number" step="0.1" value={colorantPct} onChange={e=>setColorantPct(Number(e.target.value))}/>
            </div>
          </div>
        )}
        {parfumOn && (
          <React.Fragment>
            <div>
              <label className="label">Parfum</label>
              <select value={parfumId||""} onChange={e=>setParfumId(Number(e.target.value))}>
                {db.parfums.map(p=><option key={p.id} value={p.id}>{p.nom}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}>
                <label className="label">Dosage parfum (%)</label>
                <input type="number" value={parfumPct} onChange={e=>setParfumPct(Number(e.target.value))}/>
              </div>
              <div style={{flex:1}}>
                <label className="label">Myristate (%)</label>
                <input type="number" step="0.5" value={myristatePct} onChange={e=>setMyristatePct(Number(e.target.value))}/>
              </div>
            </div>
            <div>
              <label className="label">Article myristate</label>
              <select value={myristateId||""} onChange={e=>setMyristateId(Number(e.target.value))}>
                {db.additifs.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}
              </select>
            </div>
          </React.Fragment>
        )}
      </div>
      <button className="btn-primary" style={{width:"100%"}} onClick={approuver}>Approuver cette formule</button>
    </div>
  );
}

function Formules({db, setDb, nav, setResult}){
  const [selected,setSelected] = useState(null);
  const [manualVersion,setManualVersion] = useState(null);
  const [confirmDeleteVersion,setConfirmDeleteVersion] = useState(null);
  const [deleteText,setDeleteText] = useState("");
  if(selected && manualVersion){
    return <FormuleManuelle db={db} setDb={setDb} modeleId={selected} version={manualVersion} nav={(s)=>{ if(s==="formules"){setManualVersion(null);} else {nav(s);} }} setResult={setResult}/>;
  }
  if(selected){
    const m = db.modeles.find(x=>x.id===selected);

    function supprimerFormule(version){
      const field = version==="avec" ? "formuleAvecParfum" : "formuleSansParfum";
      const newModeles = db.modeles.map(x=> x.id===selected ? {...x, [field]: null} : x);
      const newDb = {...db, modeles:newModeles};
      setDb(newDb); saveDB(newDb);
      setConfirmDeleteVersion(null);
      setDeleteText("");
    }

    return (
      <div className="screen">
        <button className="backbtn" onClick={()=>setSelected(null)}>← Formules approuvées</button>
        <h2 style={{fontSize:20,marginBottom:4}}>{m.nom}</h2>
        <p style={{fontSize:13,color:"var(--grey)",margin:"0 0 1.5rem"}}>{m.poids} g — choisis la version</p>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {m.formuleAvecParfum ? (
            <div className="card" style={{display:"flex",alignItems:"center",gap:8,padding:0}}>
              <button style={{flex:1,textAlign:"left",padding:"1.1rem",background:"transparent",border:"none"}} onClick={()=>{setResult(m.formuleAvecParfum); nav("fiche");}}>
                Avec parfum
              </button>
              <button className="btn-danger" style={{border:"none",padding:"1.1rem"}} onClick={()=>setConfirmDeleteVersion("avec")}>
                <i className="ti ti-trash" style={{fontSize:16}}></i>
              </button>
            </div>
          ) : (
            <button className="btn-secondary" style={{textAlign:"left",padding:"1.1rem",borderRadius:12,color:"var(--blue)"}} onClick={()=>setManualVersion("avec")}>
              Avec parfum — <span style={{fontSize:12}}>saisir la formule manuellement</span>
            </button>
          )}
          {confirmDeleteVersion==="avec" && (
            <div className="card" style={{borderColor:"var(--red)"}}>
              <p style={{fontSize:13,marginBottom:8}}>Tape DELETE pour supprimer cette formule approuvée.</p>
              <input value={deleteText} onChange={e=>setDeleteText(e.target.value)} placeholder="DELETE" style={{marginBottom:8}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn-secondary" style={{flex:1}} onClick={()=>{setConfirmDeleteVersion(null);setDeleteText("");}}>Annuler</button>
                <button className="btn-danger" style={{flex:1}} disabled={deleteText!=="DELETE"} onClick={()=>supprimerFormule("avec")}>Supprimer</button>
              </div>
            </div>
          )}
          {m.formuleSansParfum ? (
            <div className="card" style={{display:"flex",alignItems:"center",gap:8,padding:0}}>
              <button style={{flex:1,textAlign:"left",padding:"1.1rem",background:"transparent",border:"none"}} onClick={()=>{setResult(m.formuleSansParfum); nav("fiche");}}>
                Sans parfum
              </button>
              <button className="btn-danger" style={{border:"none",padding:"1.1rem"}} onClick={()=>setConfirmDeleteVersion("sans")}>
                <i className="ti ti-trash" style={{fontSize:16}}></i>
              </button>
            </div>
          ) : (
            <button className="btn-secondary" style={{textAlign:"left",padding:"1.1rem",borderRadius:12,color:"var(--blue)"}} onClick={()=>setManualVersion("sans")}>
              Sans parfum — <span style={{fontSize:12}}>saisir la formule manuellement</span>
            </button>
          )}
          {confirmDeleteVersion==="sans" && (
            <div className="card" style={{borderColor:"var(--red)"}}>
              <p style={{fontSize:13,marginBottom:8}}>Tape DELETE pour supprimer cette formule approuvée.</p>
              <input value={deleteText} onChange={e=>setDeleteText(e.target.value)} placeholder="DELETE" style={{marginBottom:8}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn-secondary" style={{flex:1}} onClick={()=>{setConfirmDeleteVersion(null);setDeleteText("");}}>Annuler</button>
                <button className="btn-danger" style={{flex:1}} disabled={deleteText!=="DELETE"} onClick={()=>supprimerFormule("sans")}>Supprimer</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }
  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("home")}>← Accueil</button>
      <h2 style={{fontSize:20,marginBottom:"1rem"}}>Formules approuvées</h2>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {db.modeles.map(m=>(
          <button key={m.id} className="card" style={{textAlign:"left",cursor:"pointer"}} onClick={()=>setSelected(m.id)}>
            <div style={{fontWeight:500}}>{m.nom}</div>
            <div style={{fontSize:12,color:"var(--grey)",marginTop:2}}>{m.poids} g</div>
          </button>
        ))}
      </div>
      <p style={{fontSize:12,color:"var(--grey)",marginTop:"1rem"}}>Approuve une formule depuis "Gérer mon inventaire → Modèles / formats" en calculant d'abord une recette en mode libre.</p>
    </div>
  );
}

function StockOverview({db, nav}){
  const groups = [
    {key:"cires", label:"Cires", unit:"g"},
    {key:"meches", label:"Mèches", unit:""},
    {key:"parfums", label:"Parfums", unit:"ml"},
    {key:"colorants", label:"Colorants", unit:"g"},
    {key:"additifs", label:"Additifs", unit:"g"},
    {key:"contenants", label:"Contenants", unit:""},
  ];
  const allItems = groups.flatMap(g=> (db[g.key]||[]).map(it=>({...it, _cat:g.key, _label:g.label, _unit:g.unit})));
  const rupture = allItems.filter(it=> typeof it.stock==="number" && it.stock<=0);
  const bas = allItems.filter(it=> typeof it.stock==="number" && it.stock>0 && it.stock < (it.qte ? it.qte*0.2 : 10));
  const nonRenseigne = allItems.filter(it=> typeof it.stock!=="number");

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("inventaire")}>← Inventaire</button>
      <h2 style={{fontSize:20,marginBottom:"1.25rem"}}>État du stock</h2>

      {rupture.length>0 && (
        <div style={{marginBottom:"1.5rem"}}>
          <p style={{fontSize:13,fontWeight:500,color:"var(--red)",margin:"0 0 8px"}}>⚠ Rupture de stock ({rupture.length})</p>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {rupture.map(it=>(
              <div key={it._cat+it.id} className="card" style={{borderColor:"var(--red)"}}>
                <div className="row" style={{marginBottom: it.qte ? 6 : 0}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:500,margin:0}}>{it.nom}</p>
                    <p style={{fontSize:11,color:"var(--grey)",margin:0}}>{it._label}</p>
                  </div>
                  <span className="mono" style={{color:"var(--red)",fontWeight:500}}>{it.stock} {it._unit}</span>
                </div>
                <StockBar stock={it.stock} qte={it.qte} unit={it._unit}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {bas.length>0 && (
        <div style={{marginBottom:"1.5rem"}}>
          <p style={{fontSize:13,fontWeight:500,color:"#8a6d0c",margin:"0 0 8px"}}>Stock bas ({bas.length})</p>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {bas.map(it=>(
              <div key={it._cat+it.id} className="card">
                <div className="row" style={{marginBottom: it.qte ? 6 : 0}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:500,margin:0}}>{it.nom}</p>
                    <p style={{fontSize:11,color:"var(--grey)",margin:0}}>{it._label}</p>
                  </div>
                  <span className="mono" style={{color:"#8a6d0c",fontWeight:500}}>{it.stock} {it._unit}</span>
                </div>
                <StockBar stock={it.stock} qte={it.qte} unit={it._unit}/>
              </div>
            ))}
          </div>
        </div>
      )}

      <p style={{fontSize:13,fontWeight:500,margin:"0 0 8px"}}>Tout l'inventaire</p>
      {groups.map(g=>{
        const list = db[g.key]||[];
        if(list.length===0) return null;
        return (
          <div key={g.key} style={{marginBottom:"1.25rem"}}>
            <p style={{fontSize:12,color:"var(--grey)",margin:"0 0 8px"}}>{g.label}</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {list.map(it=>(
                <div key={it.id} className="card" style={{padding:"0.65rem 1rem"}}>
                  <div className="row" style={{marginBottom: it.qte ? 6 : 0}}>

      {k:"nom",l:"Nom",t:"text"}, {k:"hex",l:"Couleur (hex)",t:"color"}, {k:"marque",l:"Marque",t:"text"}, {k:"ref",l:"Référence Bekro",t:"text"},
      {k:"prix",l:"Prix d'achat (€)",t:"number"}, {k:"qte",l:"Quantité par achat (g)",t:"number"},
      {k:"stock",l:"Stock actuel (g)",t:"number"},
    ];
    case "additifs": return [
      {k:"nom",l:"Nom",t:"text"}, {k:"fournisseur",l:"Fournisseur",t:"text"}, {k:"ref",l:"Référence produit / SKU",t:"text"},
      {k:"dosage",l:"Dosage recommandé (%)",t:"text"},
      {k:"prix",l:"Prix d'achat (€)",t:"number"}, {k:"qte",l:"Quantité par achat (g)",t:"number"},
      {k:"stock",l:"Stock actuel (g)",t:"number"},
    ];
    case "contenants": return [
      {k:"nom",l:"Nom",t:"text"}, {k:"fournisseur",l:"Fournisseur",t:"text"},
      {k:"poids",l:"Poids du contenant vide (g)",t:"number"},
      {k:"hauteur",l:"Hauteur (cm)",t:"number"}, {k:"largeur",l:"Largeur (cm)",t:"number"}, {k:"diametre",l:"Diamètre (cm)",t:"number"},
      {k:"prix",l:"Prix d'achat (€)",t:"number"},
      {k:"stock",l:"Stock actuel (unités)",t:"number"},
    ];
    case "modeles": return [
      {k:"nom",l:"Nom",t:"text"}, {k:"poids",l:"Poids (g)",t:"number"},
      {k:"hauteur",l:"Hauteur (cm)",t:"number"}, {k:"largeur",l:"Largeur (cm)",t:"number"},
      {k:"profondeur",l:"Profondeur (cm)",t:"number"}, {k:"diametre",l:"Diamètre (cm)",t:"number"},
    ];
  }
}

function InventaireListe({db, setDb, cat, nav, setEditId}){
  const items = db[cat];
  const catLabel = CATEGORIES.find(c=>c.key===cat).label;
  const fileInputRef = useRef(null);
  const [pending,setPending] = useState(null);
  const [importError,setImportError] = useState("");

  const fields = fieldsFor(cat);
  const numericKeys = fields.filter(f=>f.t==="number").map(f=>f.k);

  function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;
    setImportError("");
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const wb = XLSX.read(ev.target.result, {type:"array"});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});
        if(rows.length===0){ setImportError("Le fichier ne contient aucune ligne de données."); return; }
        const cleaned = rows.map(r=>{
          const obj = {};
          fields.forEach(f=>{
            let v = r[f.k];
            if(v===undefined || v==="") v = numericKeys.includes(f.k) ? null : "";
            else if(numericKeys.includes(f.k)) v = Number(v);
            obj[f.k] = v;
          });
          return obj;
        });
        setPending(cleaned);
      }catch(err){
        setImportError("Impossible de lire ce fichier. Vérifie qu'il s'agit bien d'un .xlsx valide.");
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  }

  function confirmImport(){
    let nextId = Math.max(0,...items.map(i=>i.id)) + 1;
    const newItems = pending.map(row=>{
      const withId = {...row, id: nextId};
      nextId++;
      if(cat==="colorants" && !row.hex) withId.hex = "#D7263D";
      return withId;
    });
    const newDb = {...db, [cat]: [...items, ...newItems]};
    setDb(newDb); saveDB(newDb);
    setPending(null);
  }

  if(pending){
    return (
      <div className="screen">
        <button className="backbtn" onClick={()=>setPending(null)}>← Annuler l'import</button>
        <h2 style={{fontSize:20,marginBottom:8}}>Aperçu de l'import</h2>
        <p style={{fontSize:13,color:"var(--grey)",margin:"0 0 1.25rem"}}>{pending.length} entrée(s) détectée(s) dans {catLabel}. Vérifie avant de valider.</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:"1.5rem",maxHeight:400,overflowY:"auto"}}>
          {pending.map((row,i)=>(
            <div key={i} className="card" style={{fontSize:13}}>
              {fields.map(f=>(
                <div key={f.k} className="row" style={{padding:"2px 0"}}>
                  <span style={{color:"var(--grey)"}}>{f.l}</span>
                  <span className="mono">{row[f.k]===null||row[f.k]===""?"—":String(row[f.k])}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        <button className="btn-primary" style={{width:"100%"}} onClick={confirmImport}>Valider l'import de {pending.length} entrée(s)</button>
      </div>
    );
  }

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("inventaire")}>← Inventaire</button>
      <div className="row" style={{marginBottom:"1rem"}}>
        <h2 style={{fontSize:20}}>{catLabel}</h2>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-secondary" style={{padding:"8px 12px",fontSize:13}} onClick={()=>fileInputRef.current.click()}>⬆ Importer .xlsx</button>
          <button className="btn-primary" style={{padding:"8px 12px",fontSize:13}} onClick={()=>{setEditId(null); nav("inventaire-form");}}>+ Ajouter</button>
        </div>
      </div>
      <input type="file" accept=".xlsx,.xls" ref={fileInputRef} onChange={handleFile} style={{display:"none"}}/>
      {importError && <p style={{fontSize:13,color:"var(--red)",marginBottom:"1rem"}}>{importError}</p>}
      <p style={{fontSize:11,color:"var(--grey)",marginBottom:"1.25rem"}}>Colonnes attendues : {fields.map(f=>f.k).join(", ")}</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {items.map(it=>(
          <div key={it.id} className="card" style={{cursor:"pointer"}} onClick={()=>{setEditId(it.id); nav("inventaire-form");}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom: it.qte ? 8 : 0}}>
              {cat==="colorants" && <span style={{width:22,height:22,borderRadius:"50%",background:it.hex,flexShrink:0,border:"0.5px solid var(--pierre)"}}></span>}
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500}}>{it.nom}</div>
                <div style={{fontSize:12,color:"var(--grey)"}}>
                  {cat==="cires" && `Fonte ${it.fonte}°C`}
                  {cat==="meches" && `${it.gamme} — ${it.type}`}
                  {cat==="parfums" && it.fournisseur}
                  {cat==="colorants" && it.ref}
                  {cat==="additifs" && it.fournisseur}
                  {cat==="modeles" && `${it.poids} g`}
                  {cat==="contenants" && `${it.poids} g — Stock: ${it.stock??"—"}`}
                </div>
              </div>
              <i className="ti ti-chevron-right" style={{color:"var(--grey)"}}></i>
            </div>
            <StockBar stock={it.stock} qte={it.qte} unit={cat==="meches"?"":cat==="parfums"?"ml":"g"}/>
          </div>
        ))}
        {items.length===0 && <p style={{color:"var(--grey)",fontSize:14}}>Aucune entrée pour l'instant.</p>}
      </div>
    </div>
  );
}

function InventaireForm({db, setDb, cat, editId, nav}){
  const existing = editId ? db[cat].find(i=>i.id===editId) : null;
  const [form,setForm] = useState(existing || {});
  const [confirmDelete,setConfirmDelete] = useState(false);
  const [deleteText,setDeleteText] = useState("");
  const [restockOpen,setRestockOpen] = useState(false);
  const [restockAmount,setRestockAmount] = useState("");
  const fields = fieldsFor(cat);
  const hasStock = fields.some(f=>f.k==="stock");

  function save(){
    let newItems;
    if(editId){
      newItems = db[cat].map(i=> i.id===editId ? {...form, id:editId} : i);
    } else {
      const newId = Math.max(0,...db[cat].map(i=>i.id)) + 1;
      newItems = [...db[cat], {...form, id:newId}];
    }
    const newDb = {...db, [cat]: newItems};
    setDb(newDb); saveDB(newDb);
    nav("inventaire-liste");
  }
  function del(){
    const newDb = {...db, [cat]: db[cat].filter(i=>i.id!==editId)};
    setDb(newDb); saveDB(newDb);
    nav("inventaire-liste");
  }
  function reapprovisionner(){
    const add = Number(restockAmount);
    if(!add || add<=0) return;
    const newStock = (Number(form.stock)||0) + add;
    const updatedForm = {...form, stock:newStock};
    setForm(updatedForm);
    const newItems = db[cat].map(i=> i.id===editId ? {...updatedForm, id:editId} : i);
    const newDb = {...db, [cat]: newItems};
    setDb(newDb); saveDB(newDb);
    setRestockAmount(""); setRestockOpen(false);
  }

  return (
    <div className="screen">
      <button className="backbtn" onClick={()=>nav("inventaire-liste")}>← {CATEGORIES.find(c=>c.key===cat).label}</button>
      <h2 style={{fontSize:20,marginBottom:"1.25rem"}}>{existing ? existing.nom : "Nouvelle entrée"}</h2>

      {existing && hasStock && (
        <div className="card" style={{marginBottom:"1.25rem"}}>
          <div className="row">
            <div>
              <p style={{fontSize:12,color:"var(--grey)",margin:0}}>Stock actuel</p>
              <p className="mono" style={{fontSize:18,fontWeight:500,margin:0}}>{form.stock ?? "—"}</p>
            </div>
            {!restockOpen && (
              <button className="btn-secondary" style={{padding:"8px 12px",fontSize:13}} onClick={()=>setRestockOpen(true)}>+ Réapprovisionner</button>
            )}
          </div>
          {restockOpen && (
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <input type="number" placeholder="Quantité ajoutée" value={restockAmount} onChange={e=>setRestockAmount(e.target.value)} style={{flex:1}}/>
              <button className="btn-primary" style={{padding:"0 14px"}} onClick={reapprovisionner}>Ajouter</button>
              <button className="btn-secondary" style={{padding:"0 14px"}} onClick={()=>{setRestockOpen(false);setRestockAmount("");}}>Annuler</button>
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:"1.5rem"}}>
        {fields.filter(f=>!f.showIf || f.showIf(form)).map(f=>(
          <div key={f.k}>
            <label className="label">{f.l}</label>
            {f.t==="select" ? (
              <select value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}>
                <option value="">—</option>
                {f.opts.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ) : f.t==="color" ? (
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <label style={{position:"relative",cursor:"pointer"}}>
                  <span style={{display:"block",width:44,height:44,borderRadius:"50%",background:form[f.k]||"#D7263D",border:"0.5px solid var(--pierre)"}}></span>
                  <input type="color" value={form[f.k]||"#D7263D"} onChange={e=>setForm({...form,[f.k]:e.target.value})} style={{position:"absolute",opacity:0,width:44,height:44,top:0,left:0,cursor:"pointer"}}/>
                </label>
                <input value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})} style={{flex:1}}/>
              </div>
            ) : (
              <input type={f.t} value={form[f.k]??""} onChange={e=>setForm({...form,[f.k]: f.t==="number"?Number(e.target.value):e.target.value})}/>
            )}
          </div>
        ))}
      </div>
      <button className="btn-primary" style={{width:"100%",marginBottom:8}} onClick={save}>Enregistrer</button>
      {existing && !confirmDelete && (
        <button className="btn-danger" style={{width:"100%"}} onClick={()=>setConfirmDelete(true)}>🗑 Supprimer cette entrée</button>
      )}
      {existing && confirmDelete && (
        <div className="card" style={{borderColor:"var(--red)"}}>
          <p style={{fontSize:13,marginBottom:8}}>Tape DELETE pour confirmer la suppression.</p>
          <input value={deleteText} onChange={e=>setDeleteText(e.target.value)} placeholder="DELETE" style={{marginBottom:8}}/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-secondary" style={{flex:1}} onClick={()=>setConfirmDelete(false)}>Annuler</button>
            <button className="btn-danger" style={{flex:1}} disabled={deleteText!=="DELETE"} onClick={del}>Supprimer</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- App ----------
function Login(){
  const [email,setEmail] = useState("");
  const [password,setPassword] = useState("");
  const [error,setError] = useState("");
  const [loading,setLoading] = useState(false);

  function submit(e){
    e.preventDefault();
    setError(""); setLoading(true);
    auth.signInWithEmailAndPassword(email, password)
      .catch(err=>{ setError("Identifiants incorrects."); })
      .finally(()=>setLoading(false));
  }

  return (
    <div className="screen" style={{paddingTop:"4rem"}}>
      <div style={{textAlign:"center",marginBottom:"2rem"}}>
        <h1 style={{fontSize:32,letterSpacing:1,color:"var(--encre)"}}>
          <span style={{fontFamily:"'Modino',sans-serif"}}>mosae</span>{" "}
          <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:400,letterSpacing:2,color:"var(--encre)"}}>collection</span>
        </h1>
      </div>
      <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <label className="label">Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
        </div>
        <div>
          <label className="label">Mot de passe</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
        </div>
        {error && <p style={{fontSize:13,color:"var(--red)",margin:0}}>{error}</p>}
        <button className="btn-primary" type="submit" disabled={loading}>{loading?"Connexion…":"Se connecter"}</button>
      </form>
      <p style={{textAlign:"center",fontSize:10,color:"var(--grey)",marginTop:"2rem"}}>Usage restreint et limité aux employés de Mosae Collection</p>
    </div>
  );
}

function App(){
  const [user,setUser] = useState(undefined);
  const [db,setDb] = useState(null);
  const [syncError,setSyncError] = useState(null);
  const [screen,setScreen] = useState("home");
  const [result,setResult] = useState(null);
  const [lastCode,setLastCode] = useState("");
  const [detailCode,setDetailCode] = useState(null);
  const [cat,setCat] = useState("cires");
  const [editId,setEditId] = useState(null);

  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(u=>setUser(u));
    return ()=>unsub();
  },[]);

  useEffect(()=>{
    if(!user) return;
    const unsub = DB_DOC.onSnapshot(
      (snap)=>{
        if(snap.exists){
          const defaults = {cires:[],meches:[],parfums:[],colorants:[],additifs:[],modeles:[],contenants:[],historique:[],compteur:0};
          setDb({...defaults, ...snap.data()});
        } else {
          const seeded = seedDB();
          DB_DOC.set(seeded).then(()=>setDb(seeded)).catch(e=>setSyncError(String(e)));
        }
      },
      (err)=>{ setSyncError(String(err)); }
    );
    return ()=>unsub();
  },[user]);

  function nav(s){ setScreen(s); window.scrollTo(0,0); }

  if(user===undefined){
    return <div className="screen" style={{textAlign:"center",paddingTop:"4rem"}}><p style={{color:"var(--grey)"}}>Chargement…</p></div>;
  }
  if(user===null){
    return <Login/>;
  }
  if(syncError){
    return <div className="screen"><h2 style={{fontSize:18,color:"var(--red)"}}>Connexion à la base impossible</h2><p style={{fontSize:13,color:"var(--grey)"}}>{syncError}</p></div>;
  }
  if(!db){
    return <div className="screen" style={{textAlign:"center",paddingTop:"4rem"}}><p style={{color:"var(--grey)"}}>Connexion à la base de données…</p></div>;
  }

  let content;
  if(screen==="home") content = <Home db={db} setDb={setDb} nav={nav}/>;
  else if(screen==="libre-type") content = <LibreFlow db={db} nav={nav} setResult={setResult}/>;
  else if(screen==="fiche") content = <FicheResultat result={result} db={db} nav={nav}/>;
  else if(screen==="checklist") content = <Checklist result={result} db={db} setDb={setDb} nav={nav} setLastCode={setLastCode}/>;
  else if(screen==="confirmation") content = <Confirmation code={lastCode} nav={nav}/>;
  else if(screen==="historique") content = <Historique db={db} nav={nav} setDetailCode={setDetailCode}/>;
  else if(screen==="historique-detail") content = <HistoriqueDetail db={db} setDb={setDb} code={detailCode} nav={nav}/>;
  else if(screen==="formules") content = <Formules db={db} setDb={setDb} nav={nav} setResult={setResult}/>;
  else if(screen==="stock") content = <StockOverview db={db} nav={nav}/>;
  else if(screen==="inventaire") content = <InventaireHome db={db} nav={nav} setCat={setCat}/>;
  else if(screen==="inventaire-liste") content = <InventaireListe db={db} setDb={setDb} cat={cat} nav={nav} setEditId={setEditId}/>;
  else if(screen==="inventaire-form") content = <InventaireForm db={db} setDb={setDb} cat={cat} editId={editId} nav={nav}/>;
  else content = <Home db={db} setDb={setDb} nav={nav}/>;

  return content;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
